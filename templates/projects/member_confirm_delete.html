{% extends 'base.html' %}

{% block title %}Retirer un membre{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[50vh]">
    <div class="stats-card max-w-lg text-center p-12 bg-bg-card border border-border-glass rounded-[30px] shadow-2xl">
        <div
            class="w-16 h-16 bg-red-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-red-500/20">
            <svg class="w-8 h-8 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                <circle cx="8.5" cy="7" r="4" />
                <line x1="18" y1="8" x2="23" y2="13" />
                <line x1="23" y1="8" x2="18" y2="13" />
            </svg>
        </div>
        <h1 class="font-syne text-2xl font-bold text-txt-main mb-3">Retirer le membre ?</h1>
        <p class="text-txt-sec text-sm leading-relaxed mb-8">
            Êtes-vous sûr de vouloir retirer <span class="text-txt-main font-bold">@{{ object.user.username }}</span> du
            projet <span class="text-txt-main font-bold">{{ object.project.name }}</span> ? cette action est réversible.
        </p>

        <form method="post" class="flex items-center gap-4">
            {% csrf_token %}
            <a href="{% url 'project_detail' object.project.pk %}"
                class="flex-1 py-3.5 bg-bg-panel hover:bg-bg-panel text-txt-sec rounded-xl font-bold transition-colors border border-border-glass">
                Annuler
            </a>
            <button type="submit"
                class="flex-1 py-3.5 bg-red-500 hover:bg-red-600 text-white rounded-xl font-bold transition-all shadow-lg shadow-red-500/20">
                Oui, retirer
            </button>
        </form>
    </div>
</div>
{% endblock %}
