{% extends 'base.html' %}

{% block title %}Ajouter un membre{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-md bg-bg-card border border-border-glass rounded-[30px] p-10 backdrop-blur-3xl shadow-2xl">
        <h1 class="font-syne text-2xl font-bold text-white mb-6 text-center">Ajouter un <span
                class="text-accent-glow">Membre</span></h1>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-4">
                {% for field in form %}
                <div class="space-y-1.5">
                    <label class="block text-xs font-bold text-txt-dim uppercase tracking-widest pl-1">{{ field.label
                        }}</label>
                    <div class="relative group">
                        {{ field }}
                        {% if field.errors %}
                        <p class="text-red-400 text-[11px] mt-1">{{ field.errors.0 }}</p>
                        {% endif %}
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button type="submit"
                    class="w-full py-3.5 bg-accent-blue hover:bg-accent-glow text-white rounded-xl font-bold transition-all shadow-glow">
                    Confirmer l'ajout
                </button>
                <a href="{% url 'project_detail' pk=request.resolver_match.kwargs.pk %}"
                    class="w-full py-3.5 text-center bg-white/5 hover:bg-white/10 text-txt-sec rounded-xl font-bold transition-all border border-white/5">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    select {
        width: 100%;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-glass);
        border-radius: 14px;
        color: white;
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
        appearance: none;
    }

    select:focus {
        border-color: var(--accent-blue);
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 15px rgba(59, 111, 245, 0.1);
    }
</style>
{% endblock %}
