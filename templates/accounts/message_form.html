{% extends 'base.html' %}

{% block title %}Nouveau message - ESMT Tasks{% endblock %}

{% block content %}
<div class="p-6 h-full overflow-y-auto flex flex-col gap-6 max-w-2xl mx-auto">
    <h1 class="font-syne text-2xl font-bold text-white">Envoyer un message</h1>

    <form method="post" class="space-y-4 bg-white/5 border border-border-col rounded-2xl p-6">
        {% csrf_token %}

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-txt-sec">Destinataire</label>
            {{ form.recipient }}
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-txt-sec">Sujet</label>
            {{ form.subject }}
        </div>

        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-txt-sec">Message</label>
            {{ form.body }}
        </div>

        <div class="flex justify-end gap-3 pt-2">
            <a href="{% url 'messages_inbox' %}"
                class="px-4 py-2 rounded-xl border border-border-col text-xs text-txt-sec hover:bg-white/5 transition-all">Annuler</a>
            <button type="submit"
                class="px-5 py-2 rounded-xl bg-accent text-white text-xs font-semibold shadow-glow hover:bg-accent-bright transition-all">
                Envoyer
            </button>
        </div>
    </form>
</div>
{% endblock %}
